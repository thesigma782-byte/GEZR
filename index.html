<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEZR | Global Exclusion Zone Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,800;1,400;1,800&display=swap');
        
        body {
            background-color: black;
            color: white;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            overflow: hidden;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fff; }
        
        .vhs-texture {
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%), 
                        linear-gradient(90deg, rgba(255,0,0,0.06), rgba(0,255,0,0.02), rgba(0,0,255,0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            opacity: 0.15;
        }

        .scanline {
            width: 100%; height: 100px; z-index: 102;
            background: linear-gradient(0deg, transparent 0%, rgba(255,255,255,0.05) 50%, transparent 100%);
            position: absolute; bottom: 100%; animation: scan 4s linear infinite;
        }

        @keyframes scan { 0% { bottom: 100%; } 100% { bottom: -100px; } }
        @keyframes radar-sweep { 0% { transform: translateY(-100%); } 100% { transform: translateY(200%); } }
        @keyframes spin-slow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .animate-radar-sweep { animation: radar-sweep 2.5s linear infinite; }
        .animate-spin-slow { animation: spin-slow 8s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // Define icons as components since we aren't using an import system
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [currentPage, setCurrentPage] = useState('login'); 
            const [selectedIsland, setSelectedIsland] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [glitch, setGlitch] = useState(false);
            const [bootSequence, setBootSequence] = useState([]);
            const [jitter, setJitter] = useState(false);
            const [viewMode, setViewMode] = useState('list');

            const DANGER_LEVELS = {
                SAFE: { label: 'SAFE', color: 'bg-zinc-800 text-zinc-400', desc: 'Zone is stable. Minimal risk to life.' },
                MILD: { label: 'MILD', color: 'bg-zinc-700 text-zinc-100', desc: 'Known hazards present. Standard gear required.' },
                MODERATE: { label: 'MODERATE', color: 'bg-white text-black font-bold', desc: 'Active threat environment.' },
                DANGER: { label: 'DANGER', color: 'bg-white text-black animate-pulse font-black', desc: 'Extreme lethal risk.' },
                UNLIKE: { label: 'UNLIKE', color: 'bg-black text-white border-white border', desc: 'Biological or physics-defying conditions.' },
                RESTRICTED: { label: 'RESTRICTED', color: 'bg-white text-black ring-2 ring-black outline outline-1 outline-white font-black', desc: 'Military blockade active.' }
            };

            const CLASSIFICATIONS = {
                WEIRD: { icon: 'ghost', label: 'PHENO-WEIRD', color: 'text-purple-400', desc: 'Psychological or paracausal effects.' },
                ANOMALY: { icon: 'activity', label: 'ANOMALOUS', color: 'text-blue-400', desc: 'Violation of laws of physics.' },
                HUMAN: { icon: 'users', label: 'HOSTILE-CIV', color: 'text-green-400', desc: 'Aggressive isolationist populations.' },
                RADIOACTIVE: { icon: 'zap', label: 'ISOTOPIC', color: 'text-yellow-400', desc: 'Ionizing radiation hazards.' },
                BIOLOGICAL: { icon: 'biohazard', label: 'BIO-HAZARD', color: 'text-red-400', desc: 'Weaponized pathogens or megafauna.' },
                UNKNOWN: { icon: 'eye-off', label: 'NULL-CLASS', color: 'text-zinc-500', desc: 'Nature of threat unverified.' }
            };

            const ISLANDS = [
                { id: 'G-001', name: 'North Sentinel', coords: '11.55° N, 92.23° E', danger: 'RESTRICTED', type: 'HUMAN', summary: '60,000 years of total isolation.', detail: 'Total denial of external contact. Indigenous hostility confirmed via satellite.', incident: '2018: Missionary John Chau killed upon beaching. 2006: Two poachers killed while sleeping.' },
                { id: 'G-002', name: 'Poveglia', coords: '45.38° N, 12.33° E', danger: 'DANGER', type: 'WEIRD', summary: 'Plague pit and psychic residue.', detail: 'Island composed of 50% human ash. High EM interference.', incident: '1920s: Asylum director reported "the soil is screaming" before leaping to his death.' },
                { id: 'G-003', name: 'Vozrozhdeniya', coords: '45.15° N, 59.27° E', danger: 'UNLIKE', type: 'BIOLOGICAL', summary: 'Soviet Bioweapon ground.', detail: 'Former island. Massive quantities of weaponized Anthrax buried in pits.', incident: '1971: Aral Smallpox Outbreak killed 3. Spores remain 99% viable in the topsoil.' },
                { id: 'G-004', name: 'Ramree Island', coords: '19.03° N, 93.85° E', danger: 'DANGER', type: 'BIOLOGICAL', summary: 'Saltwater Croc Territory.', detail: 'Swamp ecosystem dominated by apex predators.', incident: '1945: Nearly 500 soldiers vanished into the swamps in a single night.' },
                { id: 'G-006', name: 'Snake Island', coords: '24.48° S, 46.67° W', danger: 'UNLIKE', type: 'BIOLOGICAL', summary: 'Home of the Golden Lancehead.', detail: 'Snake density of 1 per square meter. Venom causes organ failure.', incident: '1920: Lighthouse family found dead. The light was dark for 3 weeks before discovery.' },
                { id: 'G-008', name: 'Lake Karachay', coords: '55.67° N, 60.79° E', danger: 'UNLIKE', type: 'RADIOACTIVE', summary: 'Most polluted place on Earth.', detail: 'Nuclear waste reservoir. Fatal dose in 60 minutes.', incident: '1967: Wind blew radioactive dust over 1,800 miles, irradiating 500,000 people.' }
            ];

            useEffect(() => {
                const gInt = setInterval(() => { setGlitch(true); setTimeout(() => setGlitch(false), 120); }, 4500);
                const jInt = setInterval(() => { setJitter(true); setTimeout(() => setJitter(false), 80); }, 3000);
                return () => { clearInterval(gInt); clearInterval(jInt); };
            }, []);

            const RadarGrid = ({ coords }) => (
                <div className="relative w-full h-full bg-[#050505] flex items-center justify-center overflow-hidden border-2 border-white/40">
                    <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'linear-gradient(#fff 1px, transparent 1px), linear-gradient(90deg, #fff 1px, transparent 1px)', backgroundSize: '30px 30px' }}></div>
                    <div className="relative z-10 flex flex-col items-center">
                        <Icon name="crosshair" size={64} className="text-white/20 animate-spin-slow" />
                        <div className="bg-white text-black px-4 py-1 text-[12px] font-black italic animate-pulse mt-4">FIXED: {coords}</div>
                    </div>
                    <div className="absolute inset-0 bg-gradient-to-b from-white/10 to-transparent h-1/2 w-full animate-radar-sweep pointer-events-none"></div>
                </div>
            );

            const startBoot = () => {
                const lines = ["INIT GEZR-KERNEL...", "LOADING ENTITY FILES...", "TERMINAL READY."];
                let i = 0;
                const interval = setInterval(() => {
                    setBootSequence(prev => [...prev, lines[i]]);
                    i++;
                    if (i === lines.length) { clearInterval(interval); setTimeout(() => setCurrentPage('home'), 800); }
                }, 400);
            };

            if (currentPage === 'login') {
                return (
                    <div className="h-screen bg-black flex flex-col items-center justify-center p-6 text-center">
                        <div className={`transition-transform duration-75 ${jitter ? 'translate-x-2' : ''}`}>
                            <h1 className="text-8xl font-black italic mb-4">GEZR</h1>
                            <p className="text-white/40 tracking-[0.4em] mb-10 text-xs">GLOBAL EXCLUSION ZONE REGISTRY</p>
                            {bootSequence.length === 0 ? (
                                <button onClick={startBoot} className="border-4 border-white px-10 py-4 hover:bg-white hover:text-black transition-all font-black text-xl">ACCESS REGISTRY</button>
                            ) : (
                                <div className="text-left bg-zinc-900 p-4 border-2 border-white w-64 mx-auto">
                                    {bootSequence.map((l, i) => <div key={i} className="text-green-500 text-[10px]">{'>'} {l}</div>)}
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            return (
                <div className={`h-screen flex flex-col transition-all ${glitch ? 'skew-x-2 opacity-80' : ''}`}>
                    <div className="vhs-texture"></div>
                    <div className="scanline"></div>
                    
                    <header className="h-20 border-b-4 border-white flex items-center justify-between px-6 bg-black z-20">
                        <div className="flex items-center gap-4">
                            <Icon name="skull" className="text-white" />
                            <h1 className="text-2xl font-black italic">GEZR</h1>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setViewMode('list')} className={`px-4 py-1 text-[10px] border-2 ${viewMode === 'list' ? 'bg-white text-black' : 'border-white/20'}`}>REGISTRY</button>
                            <button onClick={() => setViewMode('protocols')} className={`px-4 py-1 text-[10px] border-2 ${viewMode === 'protocols' ? 'bg-white text-black' : 'border-white/20'}`}>PROTOCOLS</button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-hidden flex flex-col">
                        {viewMode === 'list' ? (
                            currentPage === 'home' ? (
                                <div className="p-4 space-y-4 overflow-y-auto custom-scrollbar">
                                    {ISLANDS.map(island => (
                                        <button key={island.id} onClick={() => { setSelectedIsland(island); setCurrentPage('dossier'); }} className="w-full text-left p-6 border-2 border-white/20 hover:border-white hover:bg-white hover:text-black transition-all group">
                                            <div className="flex justify-between text-[10px] mb-2 font-black opacity-50"><span>{island.id}</span><span>{island.danger}</span></div>
                                            <h3 className="text-4xl font-black italic uppercase">{island.name}</h3>
                                        </button>
                                    ))}
                                </div>
                            ) : (
                                <div className="flex-1 overflow-y-auto p-6 custom-scrollbar bg-black">
                                    <button onClick={() => setCurrentPage('home')} className="mb-6 border border-white px-4 py-1 text-[10px] hover:bg-white hover:text-black">BACK_TO_LIST</button>
                                    <div className="grid lg:grid-cols-2 gap-10">
                                        <div className="aspect-square"><RadarGrid coords={selectedIsland.coords} /></div>
                                        <div className="space-y-6">
                                            <h2 className="text-6xl font-black italic">{selectedIsland.name}</h2>
                                            <div className={`inline-block px-4 py-1 text-sm font-black ${DANGER_LEVELS[selectedIsland.danger].color}`}>LEVEL: {selectedIsland.danger}</div>
                                            <p className="text-2xl font-black border-l-4 pl-4 uppercase">{selectedIsland.summary}</p>
                                            <div className="bg-zinc-900 p-4 text-sm text-zinc-400 font-bold uppercase">{selectedIsland.detail}</div>
                                        </div>
                                    </div>
                                </div>
                            )
                        ) : (
                            <div className="p-10 overflow-y-auto custom-scrollbar">
                                <h2 className="text-5xl font-black italic mb-10">SYSTEM_PROTOCOLS</h2>
                                <div className="grid md:grid-cols-2 gap-6">
                                    {Object.entries(DANGER_LEVELS).map(([k, v]) => (
                                        <div key={k} className="border border-white/20 p-4">
                                            <span className={`px-2 py-0.5 text-[10px] font-black ${v.color}`}>{k}</span>
                                            <p className="mt-2 text-xs text-zinc-400 italic uppercase">{v.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="h-8 border-t-2 border-white bg-black flex items-center px-6 text-[8px] tracking-[0.4em] text-white/30">
                        SAT_LINK: ONLINE // ENCRYPTION: AES-256 // GEZR_TERMINAL_V2
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
